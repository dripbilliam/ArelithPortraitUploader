project_id = "arelith-portrait-uploader"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "25MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[functions.create-upload-url]
verify_jwt = true

[functions.request-bulk-download]
verify_jwt = false

[functions.process-bulk-download-job]
verify_jwt = false

[functions.get-bulk-download-job]
verify_jwt = false

[functions.process-image]
verify_jwt = true

[functions.finalize-client-conversion]
verify_jwt = true
